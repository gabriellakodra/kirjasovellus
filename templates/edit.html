{% block title %}Muokkaa kommenttia{% endblock %} {% block content %}

    Kommentti:<br />
    <textarea name="content" rows="5" cols="40" maxlenght="5000">{{ comment.content }}</textarea>
  </p>
  <input type="submit" value="Lähetä" />
</form>
