<!doctype html>
<html>
  <head>
    <title>Julkaisun lähetys</title>
  </head>

  <body>
    <h1>Uusi julkaisu:</h1>
    <form action="/send" method="post">
      <p>
        Otsikko: <br />
        <input type="text" name="title" />
      </p>
      <p>
        Julkaisu: <br />
        <textarea name="content" rows="5" cols="40"></textarea>
      </p>
      <p>
        <input type="submit" value="Lähetä" />
      </p>
    </form>
  </body>
</html>
